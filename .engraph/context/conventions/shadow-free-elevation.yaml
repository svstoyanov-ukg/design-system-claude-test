id: shadow-free-elevation
name: "Shadow-Free Elevation"
type: convention
sub_type: code-convention
enforcement: recommended
applies_to_modules:
  - "src/app/pages/sections"
  - "src/app/pages"
  - "src/app/components/ui"
provenance: detected
created: "2026-06-18"
last_updated: "2026-06-18"

description: |
  Elevation is communicated through background-color contrast and 1px borders —
  never drop shadows. Every Card is rendered `shadow-none` (with `border-0` or
  an explicit `border-[#00000026]`). White cards sit on the #f2f4f4 section
  background; the Bryte AI panel separates via a warm gradient plus
  `border-l border-[#ebdccd]`.

  shadcn's Card and many components ship with a default shadow. Do NOT add
  `shadow-md`/`shadow-lg` (or any `shadow-*` other than `shadow-none`) to a
  surface — it visibly violates the design language. design.md §7 states the
  system does not use drop shadows.

violations:
  - "Adding shadow-sm / shadow-md / shadow-lg / shadow-xl to a Card or surface"
  - "Relying on a component's default shadow instead of setting shadow-none"

reference_files:
  - "src/app/pages/sections/benefits-overview/benefits-overview.ts"
  - "src/app/pages/sections/promotion-assistant/promotion-assistant.ts"
  - "src/app/pages/frame/frame.ts"
